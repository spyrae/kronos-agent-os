<text x="388" y="116" fill="#94A3B8" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="600">personal operator demo</text>
  <rect x="914" y="91" width="174" height="34" rx="17" fill="#12352C" stroke="#2DD4BF"/>
<text x="940" y="114" fill="#A7F3D0" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="800">safe demo data</text>
