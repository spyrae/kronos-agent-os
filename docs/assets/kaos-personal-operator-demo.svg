<text x="102" y="262" fill="#CBD5E1" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="500">Dashboard shows sessions, memory, jobs, tool audit,</text>
<text x="102" y="288" fill="#CBD5E1" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="500">and capability gates.</text>
  <rect x="102" y="306" width="414" height="64" rx="12" fill="#172033" stroke="#334155"/>
<text x="130" y="346" fill="#93C5FD" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="800">local control room</text>
