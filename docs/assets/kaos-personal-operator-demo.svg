<text x="658" y="362" fill="#C4B5FD" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700">recurring brief visibility</text>
<text x="658" y="396" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700">local dashboard control</text>
