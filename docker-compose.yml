# Kronos Agent OS (KAOS) — single agent runtime
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose up
#
# The default stack starts the local dashboard/control room only. Run the
# Telegram/webhook runtime after configuring provider and Telegram credentials.
#
# For multi-agent: duplicate the service block with different
# AGENT_NAME, TG_API_ID, TG_API_HASH, and WEBHOOK_PORT.

services:
  kaos:
    build: .
    command: ["kaos", "dashboard"]
    env_file: .env
    environment:
      - AGENT_NAME=kronos
      - WEBHOOK_PORT=8788
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8789
    volumes:
      - ./data:/app/data
      - ./workspaces:/app/workspaces
      - ./.env:/app/.env:ro
    ports:
      - "127.0.0.1:8788:8788"
      - "127.0.0.1:8789:8789"
    restart: unless-stopped

  # Example: second agent (uncomment and configure)
  # kaos-worker:
  #   build: .
  #   env_file: .env.worker
  #   environment:
  #     - AGENT_NAME=kaos-worker
  #     - WEBHOOK_PORT=8790
