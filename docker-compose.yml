# Kronos Swarm — single agent quickstart
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose up
#
# For multi-agent: duplicate the service block with different
# AGENT_NAME, TG_API_ID, TG_API_HASH, and WEBHOOK_PORT.

services:
  kronos:
    build: .
    env_file: .env
    environment:
      - AGENT_NAME=kronos
    volumes:
      - ./data:/app/data
      - ./workspaces:/app/workspaces
      - ./.env:/app/.env:ro
      - ./agents.yaml:/app/agents.yaml:ro
    restart: unless-stopped

  # Example: second agent (uncomment and configure)
