name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check kronos/ dashboard/ aso/ tests/
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: kaos --help
      - run: kaos doctor
      - run: kaos demo
      - run: kaos init smoke-agent --role "CI smoke test agent" --dry-run
      - run: kaos connect telegram
      - run: >-
          pytest -m "not integration" --cov=kronos --cov=dashboard.api --cov=aso
          --cov-report=term --cov-fail-under=53 -v

  quality-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python scripts/quality_report.py --output quality/quality.json
      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kronos-quality-report
          path: quality/
          if-no-files-found: warn
          retention-days: 30

  dashboard-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json
      - run: npm ci
        working-directory: dashboard-ui
      # npm audit intentionally NOT gated here: new CVEs turn PRs red without
      # any code change. Dependency scanning lives in security-audit.yml
      # (scheduled) + Dependabot instead.
      - run: npm run lint
        working-directory: dashboard-ui
      - run: npm run build
        working-directory: dashboard-ui
