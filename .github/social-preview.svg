<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#FF5722"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Agent nodes -->
  <g opacity="0.15">
    <circle cx="200" cy="180" r="40" fill="#4CAF50"/>
    <circle cx="350" cy="120" r="30" fill="#2196F3"/>
    <circle cx="180" cy="350" r="35" fill="#9C27B0"/>
    <circle cx="1050" cy="200" r="38" fill="#FF9800"/>
    <circle cx="1100" cy="380" r="32" fill="#E91E63"/>
    <circle cx="950" cy="140" r="28" fill="#00BCD4"/>
    <!-- Connection lines -->
    <line x1="200" y1="180" x2="350" y2="120" stroke="#4CAF50" stroke-width="1.5"/>
    <line x1="200" y1="180" x2="180" y2="350" stroke="#4CAF50" stroke-width="1.5"/>
    <line x1="350" y1="120" x2="180" y2="350" stroke="#2196F3" stroke-width="1"/>
    <line x1="1050" y1="200" x2="1100" y2="380" stroke="#FF9800" stroke-width="1.5"/>
    <line x1="1050" y1="200" x2="950" y2="140" stroke="#FF9800" stroke-width="1"/>
    <line x1="950" y1="140" x2="1100" y2="380" stroke="#00BCD4" stroke-width="1"/>
  </g>

  <!-- Central SQLite symbol -->
  <g transform="translate(640, 480)" opacity="0.12">
    <rect x="-60" y="-20" width="120" height="40" rx="8" fill="#FF9800"/>
    <text x="0" y="6" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">swarm.db</text>
  </g>

  <!-- Title -->
  <text x="640" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="-2">Kronos Swarm</text>

  <!-- Accent line -->
  <rect x="440" y="260" width="400" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="640" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#aaa" text-anchor="middle">Multi-Agent AI System</text>

  <!-- Feature pills -->
  <g font-family="monospace" font-size="14" fill="#666">
    <g transform="translate(320, 370)">
      <rect x="-70" y="-14" width="140" height="28" rx="14" fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.5"/>
      <text x="0" y="5" text-anchor="middle" fill="#FF9800">SQLite Swarm</text>
    </g>
    <g transform="translate(520, 370)">
      <rect x="-65" y="-14" width="130" height="28" rx="14" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.5"/>
      <text x="0" y="5" text-anchor="middle" fill="#4CAF50">Sub-Agents</text>
    </g>
    <g transform="translate(700, 370)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="none" stroke="#2196F3" stroke-width="1.5" opacity="0.5"/>
      <text x="0" y="5" text-anchor="middle" fill="#2196F3">11 MCP Tools</text>
    </g>
    <g transform="translate(880, 370)">
      <rect x="-65" y="-14" width="130" height="28" rx="14" fill="none" stroke="#9C27B0" stroke-width="1.5" opacity="0.5"/>
      <text x="0" y="5" text-anchor="middle" fill="#9C27B0">4-Layer Memory</text>
    </g>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="560" font-family="monospace" font-size="16" fill="#555" text-anchor="middle">No Redis. No LangGraph. No central orchestrator. Just SQLite.</text>
</svg>
