# Server Registry — SSH-accessible servers for the optional server_ops agent tool.
# Copy to servers.yaml and fill in your values.
# servers.yaml is gitignored.

primary:
  host: "1.2.3.4"
  username: "deploy"
  app_path: "/opt/kaos"
  data_path: "/opt/kaos/data"
  description: "Main KAOS deployment host"
  services:
    - kaos
    - kaos-worker
  docker: []
  projects:
    kaos:
      path: "/opt/kaos"
      services: ["kaos", "kaos-worker"]
      description: "Kronos Agent OS deployment"
